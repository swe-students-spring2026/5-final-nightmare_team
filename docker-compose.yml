services:
  web:
    build: ./web-app
    ports:
      - "5000:5000"
    environment:
       - MONGO_URI=mongodb://mongo:27017/webapp
    depends_on:
      - mongo
    networks:
      - app-network

  ml-app:
    build:
      context: .
      dockerfile: ml-app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MUSIC_RECOMMENDER_DB=/data/music_recommender.db
    volumes:
      - ml_data:/data
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - app-network

volumes:
  mongo_data:
  ml_data:

networks:
  app-network:
