<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — VibeList</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            spotify: {
              green:   '#1DB954',
              black:   '#121212',
              surface: '#181818',
              card:    '#282828',
              subtle:  '#B3B3B3',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-spotify-black min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-2">
        <div class="w-8 h-8 bg-spotify-green rounded-full flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="w-5 h-5 fill-black">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
          </svg>
        </div>
        <span class="text-white text-xl font-bold tracking-tight">VibeList</span>
      </div>
      <h1 class="text-white text-2xl font-bold mt-4">Sign in to your account</h1>
    </div>

    <!-- Card -->
    <div class="bg-spotify-card rounded-2xl p-8">
      <div id="errorMsg" class="hidden mb-4 px-4 py-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm"></div>

      <form id="loginForm" novalidate>
        <div class="mb-5">
          <label for="username" class="block text-spotify-subtle text-xs font-semibold uppercase tracking-wider mb-2">Username</label>
          <input
            id="username"
            type="text"
            autocomplete="username"
            required
            class="w-full bg-spotify-surface border border-white/10 rounded-lg px-4 py-3 text-white placeholder-spotify-subtle text-sm focus:outline-none focus:border-spotify-green transition-colors"
            placeholder="your username"
          />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-spotify-subtle text-xs font-semibold uppercase tracking-wider mb-2">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full bg-spotify-surface border border-white/10 rounded-lg px-4 py-3 text-white placeholder-spotify-subtle text-sm focus:outline-none focus:border-spotify-green transition-colors"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-spotify-green hover:brightness-110 text-black font-bold py-3 rounded-full transition-all text-sm"
        >
          Sign In
        </button>
      </form>

      <p class="text-center text-spotify-subtle text-sm mt-6">
        Don't have an account?
        <a href="/register" class="text-white hover:text-spotify-green transition-colors font-semibold">Create one</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/settings';
        } else {
          const data = await res.json();
          showError(data.error || 'Sign in failed. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
